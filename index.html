<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcade Space Shooter</title>
    <style>
        body {
            background-color: #0a0a12;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
        }
        #gameCanvas {
            border: 3px solid #00ff66;
            background-color: #020205;
            box-shadow: 0 0 20px #00ff66;
            cursor: crosshair;
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas" width="400" height="500"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        // Game States: "START", "PLAYING", "GAMEOVER"
        let gameState = "START";
        let score = 0;
        let lives = 3;

        // Player Ship
        const player = {
            x: canvas.width / 2,
            y: canvas.height - 40,
            width: 30,
            height: 20,
            speed: 6
        };

        // Arrays for game objects
        let lasers = [];
        let enemies = [];
        let particles = [];

        // Timers
        let enemyTimer = 0;
        let laserTimer = 0;

        // Track Mouse Position
        let mouseX = canvas.width / 2;

        // Listeners for Mouse and Touch
        canvas.addEventListener("mousemove", (e) => {
            const rect = canvas.getBoundingClientRect();
            mouseX = e.clientX - rect.left;
        });

        canvas.addEventListener("touchmove", (e) => {
            const rect = canvas.getBoundingClientRect();
            mouseX = e.touches[0].clientX - rect.left;
        });

        // Click to handle screen transitions
        canvas.addEventListener("click", () => {
            if (gameState === "START") {
                resetGame();
                gameState = "PLAYING";
            } else if (gameState === "GAMEOVER") {
                resetGame();
                gameState = "PLAYING";
            }
        });

        function resetGame() {
            score = 0;
            lives = 3;
            lasers = [];
            enemies = [];
            particles = [];
            player.x = canvas.width / 2;
        }

        function spawnEnemy() {
            const size = Math.random() * 20 + 15;
            enemies.push({
                x: Math.random() * (canvas.width - size),
                y: -size,
                width: size,
                height: size,
                speed: Math.random() * 2 + 1 + (score * 0.005)
            });
        }

        function createExplosion(x, y) {
            for (let i = 0; i < 10; i++) {
                particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 6,
                    vy: (Math.random() - 0.5) * 6,
                    radius: Math.random() * 3 + 1,
                    alpha: 1
                });
            }
        }

        function update() {
            if (gameState !== "PLAYING") return;

            // Smoothly move player toward mouse X position
            player.x += (mouseX - player.x) * 0.2;

            // Keep player inside canvas walls
            if (player.x < player.width / 2) player.x = player.width / 2;
            if (player.x > canvas.width - player.width / 2) player.x = canvas.width - player.width / 2;

            // Auto-fire lasers
            laserTimer++;
            if (laserTimer >= 15) { // Fires every 15 frames
                lasers.push({
                    x: player.x - 2,
                    y: player.y,
                    width: 4,
                    height: 10,
                    speed: 8
                });
                laserTimer = 0;
            }

            // Move Lasers
            for (let i = lasers.length - 1; i >= 0; i--) {
                lasers[i].y -= lasers[i].speed;
                if (lasers[i].y < 0) lasers.splice(i, 1);
            }

            // Spawn Enemies
            enemyTimer++;
            if (enemyTimer >= 50) {
                spawnEnemy();
                enemyTimer = 0;
            }

            // Move and manage enemies
            for (let i = enemies.length - 1; i >= 0; i--) {
                let e = enemies[i];
                e.y += e.speed;

                // Enemy goes past bottom border
                if (e.y > canvas.height) {
                    enemies.splice(i, 1);
                    lives--;
                    if (lives <= 0) gameState = "GAMEOVER";
                    continue;
                }

                // Crash: Enemy hits Player
                if (e.x < player.x + player.width/2 &&
                    e.x + e.width > player.x - player.width/2 &&
                    e.y < player.y + player.height &&
                    e.y + e.height > player.y) {
                    
                    createExplosion(e.x + e.width/2, e.y + e.height/2);
                    enemies.splice(i, 1);
                    lives--;
                    if (lives <= 0) gameState = "GAMEOVER";
                    continue;
                }

                // Laser hits Enemy
                for (let j = lasers.length - 1; j >= 0; j--) {
                    let l = lasers[j];
                    if (l.x < e.x + e.width &&
                        l.x + l.width > e.x &&
                        l.y < e.y + e.height &&
                        l.y + l.height > e.y) {
                        
                        createExplosion(e.x + e.width / 2, e.y + e.height / 2);
                        enemies.splice(i, 1);
                        lasers.splice(j, 1);
                        score += 10;
                        break;
                    }
                }
            }

            // Update explosion particles
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.alpha -= 0.04;
                if (p.alpha <= 0) particles.splice(i, 1);
            }
        }

        function draw() {
            // Clear Screen
            ctx.fillStyle = "#020205";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (gameState === "START") {
                ctx.fillStyle = "#00ff66";
                ctx.font = "24px 'Courier New'";
                ctx.textAlign = "center";
                ctx.fillText("SPACE SHOOTER", canvas.width / 2, canvas.height / 2 - 30);
                
                ctx.fillStyle = "#ffffff";
                ctx.font = "14px 'Courier New'";
                ctx.fillText("Move Mouse/Finger to Guide Ship", canvas.width / 2, canvas.height / 2 + 10);
                ctx.fillText("Lasers Fire Automatically", canvas.width / 2, canvas.height / 2 + 30);
                
                ctx.fillStyle = "#00ff66";
                ctx.font = "18px 'Courier New'";
                ctx.fillText("CLICK SCREEN TO START", canvas.width / 2, canvas.height / 2 + 80);
            }

            if (gameState === "PLAYING") {
                // Draw Player Ship (Triangle)
                ctx.fillStyle = "#ffffff";
                ctx.beginPath();
                ctx.moveTo(player.x, player.y);
                ctx.lineTo(player.x - player.width / 2, player.y + player.height);
                ctx.lineTo(player.x + player.width / 2, player.y + player.height);
                ctx.closePath();
                ctx.fill();

                // Draw Lasers
                ctx.fillStyle = "#00ffff";
                lasers.forEach(l => ctx.fillRect(l.x, l.y, l.width, l.height));

                // Draw Enemies
                ctx.fillStyle = "#ff3366";
                enemies.forEach(e => ctx.fillRect(e.x, e.y, e.width, e.height));

                // Draw Particles
                particles.forEach(p => {
                    ctx.save();
                    ctx.globalAlpha = p.alpha;
                    ctx.fillStyle = "#ff9900";
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.restore();
                });

                // UI Text (Score & Lives)
                ctx.fillStyle = "#ffffff";
                ctx.font = "16px 'Courier New'";
                ctx.textAlign = "left";
                ctx.fillText(`SCORE: ${score}`, 15, 30);
                ctx.textAlign = "right";
                ctx.fillText(`LIVES: ${lives}`, canvas.width - 15, 30);
            }

            if (gameState === "GAMEOVER") {
                ctx.fillStyle = "#ff3366";
                ctx.font = "28px 'Courier New'";
                ctx.textAlign = "center";
                ctx.fillText("GAME OVER", canvas.width / 2, canvas.height / 2 - 20);
                
                ctx.fillStyle = "#ffffff";
                ctx.font = "18px 'Courier New'";
                ctx.fillText(`FINAL SCORE: ${score}`, canvas.width / 2, canvas.height / 2 + 20);
                
                ctx.fillStyle = "#00ff66";
                ctx.fillText("CLICK TO PLAY AGAIN", canvas.width / 2, canvas.height / 2 + 70);
            }
        }

        // Main Execution loop
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>
</html>
