<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Space Battle Royale - 3D Skin Hangar</title>
    <style>
        body, html {
            background-color: #020205;
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
            user-select: none;
            touch-action: none;
        }

        canvas {
            display: block;
            background-color: #020205;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(2, 2, 5, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
            z-index: 10;
        }

        h1 { color: #ff0055; font-size: 36px; margin-bottom: 10px; text-shadow: 0 0 10px rgba(255,0,85,0.5); }
        h2 { color: #00ffcc; margin-top: 0; }
        p { max-width: 500px; line-height: 1.5; font-size: 14px; margin: 5px 0 20px 0; color: #ccc; }

        button {
            background: transparent;
            border: 2px solid #00ffcc;
            color: #00ffcc;
            font-family: inherit;
            font-weight: bold;
            padding: 12px 30px;
            font-size: 18px;
            cursor: pointer;
            margin: 10px;
            box-shadow: 0 0 10px rgba(0, 255, 204, 0.2);
            transition: all 0.2s ease;
        }
        button:hover {
            background: #00ffcc;
            color: #020205;
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.6);
        }

        button.secondary { border-color: #ff0055; color: #ff0055; }
        button.secondary:hover { background: #ff0055; color: white; box-shadow: 0 0 20px rgba(255, 0, 85, 0.6); }

        #settings-menu {
            background: rgba(10, 10, 25, 0.95);
            border: 3px solid #00ffcc;
            padding: 25px;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            max-width: 480px;
            width: 90%;
            box-shadow: 0 0 30px rgba(0,255,204,0.3);
            max-height: 85vh;
            overflow-y: auto;
        }

        .setting-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            margin: 6px 0;
            font-size: 14px;
        }

        select, input[type="text"] {
            background: #06060c;
            border: 1px solid #00ffcc;
            color: white;
            font-family: inherit;
            padding: 6px;
            font-size: 14px;
            outline: none;
        }

        input[type="color"] {
            background: transparent;
            border: none;
            width: 40px;
            height: 30px;
            cursor: pointer;
            outline: none;
        }

        .bind-btn {
            background: #111;
            border: 1px dashed #ff0055;
            color: #ff0055;
            padding: 5px 12px;
            font-size: 14px;
            min-width: 110px;
            margin: 0;
        }
        .bind-btn.waiting {
            border-style: solid;
            background: #ff0055;
            color: white;
            animation: blink 1s infinite;
        }

        @keyframes blink { 50% { opacity: 0.5; } }
    </style>
</head>
<body>

    <div id="start-screen" class="overlay">
        <h1>SPACE BATTLE ROYALE 3D</h1>
        <p>19 Ships drop into a 3D matrix. Click Settings to modify your flight keys or jump into the Hangar to construct a fully customized ship color mesh skin!</p>
        <button onclick="changeState('PLAYING')">DROP INTO MATCH</button>
        <button class="secondary" onclick="openSettings()">SETTINGS & HANGAR</button>
    </div>

    <div id="settings-overlay" class="overlay" style="display: none;">
        <div id="settings-menu">
            <h2>3D CONFIG & HANGAR</h2>
            
            <div class="setting-row">
                <label>Steering Input:</label>
                <select id="control-select" onchange="updateControlScheme()">
                    <option value="keyboard">Keyboard Binds (Recommended)</option>
                    <option value="mouse">Mouse Horizon Look</option>
                </select>
            </div>

            <div class="setting-row">
                <label>Mobile Touch Overlay:</label>
                <select id="mobile-select" onchange="updateMobileControls()">
                    <option value="false">Hidden (PC Default)</option>
                    <option value="true">Visible (On-Screen Layout)</option>
                </select>
            </div>

            <div style="border-bottom: 1px solid #333; width: 100%; margin: 10px 0;"></div>
            <h3 style="margin: 0 0 5px 0; color: #00ffcc;">SHIP SKIN HANGAR</h3>
            
            <div class="setting-row">
                <label>Select Skin Slot:</label>
                <select id="skin-slot-select" onchange="loadSkinEditor()">
                    <option value="0">Slot 1</option>
                    <option value="1">Slot 2</option>
                    <option value="2">Slot 3</option>
                    <option value="3">Slot 4</option>
                    <option value="4">Slot 5</option>
                </select>
            </div>
            <div class="setting-row">
                <label>Designator Name:</label>
                <input type="text" id="skin-name-input" oninput="saveSkinChanges()" maxlength="14">
            </div>
            <div class="setting-row">
                <label>Primary Wing Hull:</label>
                <input type="color" id="skin-primary-input" onchange="saveSkinChanges()">
            </div>
            <div class="setting-row">
                <label>Canopy Spine Accent:</label>
                <input type="color" id="skin-secondary-input" onchange="saveSkinChanges()">
            </div>
            <button style="margin: 8px 0; padding: 6px 15px; font-size: 13px; width: 100%;" onclick="equipSkin()">EQUIP SELECTED DESIGN</button>

            <div style="border-bottom: 1px solid #333; width: 100%; margin: 10px 0;"></div>
            <h3 style="margin: 0 0 5px 0; color: #ff0055;">INPUT KEYBINDS</h3>

            <div class="setting-row">
                <label>Toggle Camera (1P/3P):</label>
                <button class="bind-btn" id="bind-TOGGLE_VIEW" onclick="startRebind('TOGGLE_VIEW')">KeyV</button>
            </div>
            <div class="setting-row">
                <label>Deploy Barrier:</label>
                <button class="bind-btn" id="bind-BUILD" onclick="startRebind('BUILD')">Space</button>
            </div>
            <div class="setting-row">
                <label>Thrust Forward:</label>
                <button class="bind-btn" id="bind-UP" onclick="startRebind('UP')">KeyW</button>
            </div>
            <div class="setting-row">
                <label>Reverse Brake:</label>
                <button class="bind-btn" id="bind-DOWN" onclick="startRebind('DOWN')">KeyS</button>
            </div>
            <div class="setting-row">
                <label>Yaw Steer Left:</label>
                <button class="bind-btn" id="bind-LEFT" onclick="startRebind('LEFT')">KeyA</button>
            </div>
            <div class="setting-row">
                <label>Yaw Steer Right:</label>
                <button class="bind-btn" id="bind-RIGHT" onclick="startRebind('RIGHT')">KeyD</button>
            </div>

            <button style="margin-top: 15px; width: 100%;" onclick="closeSettings()">SAVE CHANGES</button>
        </div>
    </div>

    <div id="gameover-screen
