<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Battle Royale</title>
    <style>
        body {
            background-color: #06060c;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            user-select: none;
        }
        #gameCanvas {
            border: 3px solid #333;
            background-color: #020205;
            box-shadow: 0 0 30px rgba(255, 0, 85, 0.2);
            cursor: crosshair;
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas" width="600" height="600"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        // Game States: "START", "PLAYING", "GAMEOVER", "VICTORY"
        let gameState = "START";
        
        let entities = []; // Holds both player and bots
        let lasers = [];
        let particles = [];
        
        // Storm / Safe Zone Circle
        const storm = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            radius: 400,
            minRadius: 40,
            shrinkSpeed: 0.15
        };

        let mouseX = canvas.width / 2;
        let mouseY = canvas.height / 2;

        // Input Trackers
        canvas.addEventListener("mousemove", (e) => {
            const rect = canvas.getBoundingClientRect();
            mouseX = e.clientX - rect.left;
            mouseY = e.clientY - rect.top;
        });

        canvas.addEventListener("click", () => {
            if (gameState === "START" || gameState === "GAMEOVER" || gameState === "VICTORY") {
                initBattleRoyale();
                gameState = "PLAYING";
            }
        });

        function initBattleRoyale() {
            entities = [];
            lasers = [];
            particles = [];
            storm.radius = 400;

            // Spawn Player
            entities.push({
                id: "player",
                isPlayer: true,
                x: canvas.width / 2,
                y: canvas.height / 2 + 100,
                radius: 12,
                speed: 3.5,
                hp: 100,
                maxHp: 100,
                color: "#00ffcc",
                fireCooldown: 0,
                target: null
            });

            // Spawn 15 Bots spread across the map
            for (let i = 0; i < 15; i++) {
                // Angle and distance distribution to scatter them
                let angle = Math.random() * Math.PI * 2;
                let dist = Math.random() * 250 + 50; 
                
                entities.push({
                    id: "bot_" + i,
                    isPlayer: false,
                    x: canvas.width / 2 + Math.cos(angle) * dist,
                    y: canvas.height / 2 + Math.sin(angle) * dist,
                    radius: 10,
                    speed: Math.random() * 1 + 1.5,
                    vx: (Math.random() - 0.5) * 2,
                    vy: (Math.random() - 0.5) * 2,
                    hp: 80,
                    maxHp: 80,
                    color: `hsl(${Math.random() * 50 + 15}, 100%, 60%)`, // Orange/Yellow shades
                    fireCooldown: Math.floor(Math.random() * 30),
                    changeDirTimer: 0
                });
            }
        }

        function createExplosion(x, y, color) {
            for (let i = 0; i < 12; i++) {
                particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 5,
                    vy: (Math.random() - 0.5) * 5,
                    radius: Math.random() * 3 + 1,
                    alpha: 1,
                    color: color || "#ff5500"
                });
            }
        }

        function getDistance(x1, y1, x2, y2) {
            return Math.sqrt((x2 - x1) ** 2 + (y2 - y1) ** 2);
        }

        function update() {
            if (gameState !== "PLAYING") return;

            // 1. Shrink Storm
            if (storm.radius > storm.minRadius) {
                storm.radius -= storm.shrinkSpeed;
            }

            // 2. Update Entities (Player & Bots)
            for (let i = entities.length - 1; i >= 0; i--) {
                let ent = entities[i];

                // Storm Damage Check
                let distFromCenter = getDistance(ent.x, ent.y, storm.x, storm.y);
                if (distFromCenter > storm.radius) {
                    ent.hp -= 0.2; // Continuous ticks of storm damage
                }

                if (ent.isPlayer) {
                    // Move Player towards Mouse
                    let dx = mouseX - ent.x;
                    let dy = mouseY - ent.y;
                    let dist = Math.sqrt(dx*dx + dy*dy);
                    
                    if (dist > 5) {
                        ent.x += (dx / dist) * ent.speed;
                        ent.y += (dy / dist) * ent.speed;
                    }

                    // Player Auto-Target nearest bot
                    let nearestBot = null;
                    let recordDist = Infinity;
                    entities.forEach(other => {
                        if (!other.isPlayer) {
                            let d = getDistance(ent.x, ent.y, other.x, other.y);
                            if (d < recordDist) {
                                recordDist = d;
                                nearestBot = other;
                            }
                        }
                    });

                    // Fire Laser at target
                    if (nearestBot && ent.fireCooldown <= 0) {
                        let tDx = nearestBot.x - ent.x;
                        let tDy = nearestBot.y - ent.y;
                        let tDist = Math.sqrt(tDx*tDx + tDy*tDy);
                        
                        lasers.push({
                            x: ent.x,
                            y: ent.y,
                            vx: (tDx / tDist) * 7,
                            vy: (tDy / tDist) * 7,
                            ownerId: ent.id,
                            color: "#00ffcc"
                        });
                        ent.fireCooldown = 18; // Attack speed delay
                    }

                } else {
                    // Bot logic: AI wandering
                    ent.changeDirTimer++;
                    if (ent.changeDirTimer > 60) {
                        // Randomly adjust direction vectors
                        ent.vx = (Math.random() - 0.5) * ent.speed * 2;
                        ent.vy = (Math.random() - 0.5) * ent.speed * 2;
                        ent.changeDirTimer = 0;
                    }

                    ent.x += ent.vx;
                    ent.y += ent.vy;

                    // Keep bots bounce-contained within canvas edges
                    if (ent.x < 10 || ent.x > canvas.width - 10) ent.vx *= -1;
                    if (ent.y < 10 || ent.y > canvas.height - 10) ent.vy *= -1;

                    // Bot Auto-targeting: Target closest other entity (could be player or bot)
                    let nearestTarget = null;
                    let recordDist = Infinity;
                    entities.forEach(other => {
                        if (other.id !== ent.id) {
                            let d = getDistance(ent.x, ent.y, other.x, other.y);
                            if (d < recordDist) {
                                recordDist = d;
                                nearestTarget = other;
                            }
                        }
                    });

                    // Bot Shoot
                    if (nearestTarget && ent.fireCooldown <= 0 && recordDist < 200) {
                        let tDx = nearestTarget.x - ent.x;
                        let tDy = nearestTarget.y - ent.y;
                        let tDist = Math.sqrt(tDx*tDx + tDy*tDy);

                        lasers.push({
                            x: ent.x,
                            y: ent.y,
                            vx: (tDx / tDist) * 5,
                            vy: (tDy / tDist) * 5,
                            ownerId: ent.id,
                            color: ent.color
                        });
                        ent.fireCooldown = 35 + Math.random() * 20; // Lower fire rate than player
                    }
                }

                if (ent.fireCooldown > 0) ent.fireCooldown--;

                // Death Condition Check
                if (ent.hp <= 0) {
                    createExplosion(ent.x, ent.y, ent.color);
                    if (ent.isPlayer) {
                        gameState = "GAMEOVER";
                    }
                    entities.splice(i, 1);
                }
            }

            // Check if player is the absolute last survivor
            if (entities.length === 1 && entities[0].isPlayer) {
                gameState = "VICTORY";
            }

            // 3. Update Lasers
            for (let i = lasers.length - 1; i >= 0; i--) {
                let l = lasers[i];
                l.x += l.vx;
                l.y += l.vy;

                // Wall bounds check
                if (l.x < 0 || l.x > canvas.width || l.y < 0 || l.y > canvas.height) {
                    lasers.splice(i, 1);
                    continue;
                }

                // Hit registration
                for (let j = 0; j < entities.length; j++) {
                    let ent = entities[j];
                    if (ent.id !== l.ownerId) { // Prevent self-harming shots
                        let d = getDistance(l.x, l.y, ent.x, ent.y);
                        if (d < ent.radius + 3) {
                            ent.hp -= 20; // Base damage per shot
                            createExplosion(l.x, l.y, l.color);
                            lasers.splice(i, 1);
                            break;
                        }
                    }
                }
            }

            // 4. Update Particle effects
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.alpha -= 0.03;
                if (p.alpha <= 0) particles.splice(i, 1);
            }
        }

        function draw() {
            // Context refresh
            ctx.fillStyle = "#020205";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (gameState === "START") {
                ctx.fillStyle = "#ff0055";
                ctx.font = "24px 'Courier New'";
                ctx.textAlign = "center";
                ctx.fillText("SPACE BATTLE ROYALE", canvas.width / 2, canvas.height / 2 - 40);
                
                ctx.fillStyle = "#ffffff";
                ctx.font = "14px 'Courier New'";
                ctx.fillText("16 Ships Drop In. 1 Survives.", canvas.width / 2, canvas.height / 2);
                ctx.fillText("Avoid the shrinking Red Storm Wall.", canvas.width / 2, canvas.height / 2 + 25);
                ctx.fillText("Move mouse to steer. Auto-attacks active.", canvas.width / 2, canvas.height / 2 + 50);
                
                ctx.fillStyle = "#00ffcc";
                ctx.font = "18px 'Courier New'";
                ctx.fillText("CLICK TO DROP IN", canvas.width / 2, canvas.height / 2 + 110);
                return;
            }

            // --- DRAW GAMEPLAY ELEMENTS ---
            
            // Draw Storm Boundaries (Outer Red Zone)
            ctx.strokeStyle = "rgba(255, 0, 85, 0.8)";
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.arc(storm.x, storm.y, storm.radius, 0, Math.PI * 2);
            ctx.stroke();

            // Tint the danger zone lightly red
            ctx.fillStyle = "rgba(255, 0, 85, 0.05)";
            ctx.beginPath();
            ctx.arc(storm.x, storm.y, storm.radius, 0, Math.PI * 2);
            ctx.rect(canvas.width, 0, -canvas.width, canvas.height); // Outer invert mask
            ctx.fill();

            // Draw Lasers
            lasers.forEach(l => {
                ctx.fillStyle = l.color;
                ctx.beginPath();
                ctx.arc(l.x, l.y, 3, 0, Math.PI * 2);
                ctx.fill();
            });

            // Draw Entities
            entities.forEach(ent => {
                // Draw health bar above ships
                ctx.fillStyle = "rgba(255,255,255,0.2)";
                ctx.fillRect(ent.x - 12, ent.y - ent.radius - 8, 24, 4);
                ctx.fillStyle = ent.isPlayer ? "#00ffcc" : "#ff3333";
                let hpPct = Math.max(0, ent.hp / ent.maxHp);
                ctx.fillRect(ent.x - 12, ent.y - ent.radius - 8, 24 * hpPct, 4);

                // Draw Ships
                ctx.fillStyle = ent.color;
                ctx.beginPath();
                ctx.arc(ent.x, ent.y, ent.radius, 0, Math.PI * 2);
                ctx.fill();
                
                // Add inner core design
                ctx.fillStyle = "#ffffff";
                ctx.beginPath();
                ctx.arc(ent.x, ent.y, ent.radius * 0.4, 0, Math.PI * 2);
                ctx.fill();
            });

            // Draw Particles
            particles.forEach(p => {
                ctx.save();
                ctx.globalAlpha = p.alpha;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            });

            // --- DRAW HUD ---
            let playerObj = entities.find(e => e.isPlayer);
            let healthDisplay = playerObj ? Math.ceil(playerObj.hp) : 0;

            ctx.fillStyle = "#ffffff";
            ctx.font = "bold 16px 'Courier New'";
            ctx.textAlign = "left";
            ctx.fillText(`HEALTH: ${healthDisplay > 0 ? healthDisplay : 0}%`, 20, 35);
            
            ctx.textAlign = "right";
            ctx.fillStyle = "#ff0055";
            ctx.fillText(`ALIVE: ${entities.length}`, canvas.width - 20, 35);

            if (storm.radius < 120 && storm.radius > storm.minRadius) {
                ctx.fillStyle = "#ff0055";
                ctx.textAlign = "center";
                ctx.font = "12px 'Courier New'";
                ctx.fillText("STORM COLLAPSING!", canvas.width / 2, 70);
            }

            // --- END GAME SCREENS ---
            if (gameState === "GAMEOVER") {
                ctx.fillStyle = "rgba(0,0,0,0.8)";
                ctx.fillRect(0,0,canvas.width,canvas.height);
                ctx.fillStyle = "#ff3366";
                ctx.font = "32px 'Courier New'";
                ctx.textAlign = "center";
                ctx.fillText("ELIMINATED", canvas.width / 2, canvas.height / 2 - 20);
                ctx.fillStyle = "#ffffff";
                ctx.font = "16px 'Courier New'";
                ctx.fillText(`Ranked #${entities.length + 1} out of 16`, canvas.width / 2, canvas.height / 2 + 20);
                ctx.fillStyle = "#00ffcc";
                ctx.fillText("CLICK TO REDROP", canvas.width / 2, canvas.height / 2 + 70);
            }

            if (gameState === "VICTORY") {
                ctx.fillStyle = "rgba(0,0,0,0.8)";
                ctx.fillRect(0,0,canvas.width,canvas.height);
                ctx.fillStyle = "#00ffcc";
                ctx.font = "32px 'Courier New'";
                ctx.textAlign = "center";
                ctx.fillText("#1 VICTORY ROYALE", canvas.width / 2, canvas.height / 2 - 20);
                ctx.fillStyle = "#ffffff";
                ctx.font = "16px 'Courier New'";
                ctx.fillText("You are the last ship standing!", canvas.width / 2, canvas.height / 2 + 20);
                ctx.fillStyle = "#ff0055";
                ctx.fillText("CLICK TO PLAY AGAIN", canvas.width / 2, canvas.height / 2 + 70);
            }
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>
</html>
