<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Space Battle Royale - Optimized 3D Terrain</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #020205; font-family: monospace; }
        canvas { display: block; }
        #ui { position: absolute; top: 20px; left: 20px; color: #00ffcc; font-size: 16px; pointer-events: none; text-shadow: 0 0 5px #000; }
    </style>
</head>
<body>

    <div id="ui">
        HEALTH: <span id="hp">100</span>%<br>
        ALIVE: <span id="alive">50</span>/50<br>
        CONTROLS: W/S (Move), Mouse (Look/Steer), Left Click (Shoot)
    </div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        const mapSize = 10000;
        let player = { x: mapSize/2, y: mapSize/2, angle: 0, hp: 100, speed: 5, fireCooldown: 0 };
        let entities = [];
        let lasers = [];
        let keys = {};
        let mouseX = 0, mouseY = 0, mousePressed = false;

        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener("resize", resize);
        resize();

        window.addEventListener("keydown", e => keys[e.code] = true);
        window.addEventListener("keyup", e => keys[e.code] = false);
        window.addEventListener("mousemove", e => { mouseX = e.clientX; mouseY = e.clientY; });
        window.addEventListener("mousedown", e => { if(e.button === 0) mousePressed = true; });
        window.addEventListener("mouseup", e => { if(e.button === 0) mousePressed = false; });

        // --- NATURAL TERRAIN ENGINE ---
        function getHeight(x, y) {
            if (x < 0 || x > mapSize || y < 0 || y > mapSize) return 0;
            return Math.sin(x * 0.001) * Math.cos(y * 0.001) * 120 + Math.sin(x * 0.004) * 30;
        }

        // Initialize Bot Enemies
        for (let i = 0; i < 49; i++) {
            entities.push({
                id: i,
                x: mapSize/2 + (Math.random() - 0.5) * 3000,
                y: mapSize/2 + (Math.random() - 0.5) * 3000,
                angle: Math.random() * Math.PI * 2,
                hp: 100,
                color: `hsl(${Math.random() * 360}, 80%, 60%)`,
                fireCooldown: Math.random() * 60
            });
        }

        // --- 3D PERSPECTIVE PROJECTION ---
        function project3D(wx, wy, wz) {
            let pGroundZ = getHeight(player.x, player.y);
            let camX = player.x - Math.cos(player.angle) * 80;
            let camY = player.y - Math.sin(player.angle) * 80;
            let camZ = pGroundZ + 40;

            let dx = wx - camX, dy = wy - camY, dz = wz - camZ;
            let rx = -dx * Math.sin(player.angle) + dy * Math.cos(player.angle);
            let ry =  dx * Math.cos(player.angle) + dy * Math.sin(player.angle);

            if (ry <= 2) return null;

            let fov = 500;
            return {
                x: canvas.width / 2 + (rx / ry) * fov,
                y: canvas.height / 2 - (dz / ry) * fov + canvas.height * 0.1,
                scale: fov / ry,
                depth: ry
            };
        }

        function update() {
            // Player Rotation via Horizon Mouse Look
            let mouseOffsetX = mouseX - canvas.width / 2;
            player.angle += (mouseOffsetX / (canvas.width / 2)) * 0.04;

            // Player Movement
            if (keys["KeyW"] || keys["ArrowUp"]) {
                player.x += Math.cos(player.angle) * player.speed;
                player.y += Math.sin(player.angle) * player.speed;
            }
            if (keys["KeyS"] || keys["ArrowDown"]) {
                player.x -= Math.cos(player.angle) * player.speed;
                player.y -= Math.sin(player.angle) * player.speed;
            }

            // Player Shooting
            if (player.fireCooldown > 0) player.fireCooldown--;
            if (mousePressed && player.fireCooldown === 0) {
                lasers.push({ x: player.x, y: player.y, z: getHeight(player.x, player.y) + 5, vx: Math.cos(player.angle) * 20, vy: Math.sin(player.angle) * 20, isPlayer: true, life: 60 });
                player.fireCooldown = 10;
            }

            // Update Bots
            entities.forEach(bot => {
                bot.x += Math.cos(bot.angle) * 1.5;
                bot.y += Math.sin(bot.angle) * 1.5;
                if (Math.random() < 0.01) bot.angle = Math.random() * Math.PI * 2;

                // Simple AI Shooting at player if close
                let dist = Math.hypot(player.x - bot.x, player.y - bot.y);
                if (bot.fireCooldown > 0) bot.fireCooldown--;
                if (dist < 600 && bot.fireCooldown === 0) {
                    let aim = Math.atan2(player.y - bot.y, player.x - bot.x);
                    lasers.push({ x: bot.x, y: bot.y, z: getHeight(bot.x, bot.y) + 5, vx: Math.cos(aim) * 15, vy: Math.sin(aim) * 15, isPlayer: false, life: 60 });
                    bot.fireCooldown = 80;
                }
            });

            // Update Lasers & Collisions
            for (let i = lasers.length - 1; i >= 0; i--) {
                let l = lasers[i];
                l.x += l.vx; l.y += l.vy; l.life--;

                let ground = getHeight(l.x, l.y);
                if (l.life <= 0 || l.z < ground) { lasers.splice(i, 1); continue; }

                if (l.isPlayer) {
                    for (let j = entities.length - 1; j >= 0; j--) {
                        let bot = entities[j];
                        if (Math.hypot(l.x - bot.x, l.y - bot.y) < 20) {
                            bot.hp -= 20;
                            lasers.splice(i, 1);
                            if (bot.hp <= 0) entities.splice(j, 1);
                            break;
                        }
                    }
                } else {
                    if (Math.hypot(l.x - player.x, l.y - player.y) < 20) {
                        player.hp -= 5;
                        lasers.splice(i, 1);
                    }
                }
            }

            document.getElementById("hp").innerText = Math.max(0, Math.ceil(player.hp));
            document.getElementById("alive").innerText = entities.length + 1;
        }

        function draw() {
            ctx.fillStyle = "#020207";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 1. Draw Terrain Wireframe Lines (Optimized Grid)
            ctx.strokeStyle = "rgba(0, 255, 204, 0.15)";
            ctx.lineWidth = 1;
            let step = 80;
            let startX = Math.floor((player.x - 800) / step) * step;
            let startY = Math.floor((player.y - 800) / step) * step;

            for (let x = startX; x < player.x + 800; x += step) {
                for (let y = startY; y < player.y + 800; y += step) {
                    let p1 = project3D(x, y, getHeight(x, y));
                    let p2 = project3D(x + step, y, getHeight(x + step, y));
                    let p3 = project3D(x, y + step, getHeight(x, y + step));

                    if (p1) {
                        if (p2) { ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.stroke(); }
                        if (p3) { ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p3.x, p3.y); ctx.stroke(); }
                    }
                }
            }

            // 2. Build Render Queue for Entities and Lasers (Z-Sorting)
            let queue = [];

            entities.forEach(bot => {
                let p = project3D(bot.x, bot.y, getHeight(bot.x, bot.y));
                if (p) queue.push({ depth: p.depth, draw: () => drawShip(p.x, p.y, p.scale, bot.color, bot.hp) });
            });

            lasers.forEach(l => {
                let p = project3D(l.x, l.y, l.z);
                if (p) queue.push({ depth: p.depth, draw: () => {
                    ctx.fillStyle = l.isPlayer ? "#00ffcc" : "#ff0055";
                    ctx.beginPath(); ctx.arc(p.x, p.y, Math.max(2, 3 * p.scale), 0, Math.PI * 2); ctx.fill();
                }});
            });

            queue.sort((a, b) => b.depth - a.depth);
            queue.forEach(item => item.draw());

            // 3. Draw Dynamic Aligning Crosshair
            let targetWorldX = player.x + Math.cos(player.angle) * 300;
            let targetWorldY = player.y + Math.sin(player.angle) * 300;
            let targetWorldZ = getHeight(targetWorldX, targetWorldY) + 5;
            let crosshair = project3D(targetWorldX, targetWorldY, targetWorldZ);

            if (crosshair) {
                ctx.strokeStyle = "#00ffcc"; ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(crosshair.x - 12, crosshair.y); ctx.lineTo(crosshair.x + 12, crosshair.y);
                ctx.moveTo(crosshair.x, crosshair.y - 12); ctx.lineTo(crosshair.x, crosshair.y + 12);
                ctx.stroke();
            }
        }

        function drawShip(x, y, scale, color, hp) {
            let size = 12 * scale;
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.moveTo(x, y - size);
            ctx.lineTo(x - size, y + size);
            ctx.lineTo(x + size, y + size);
            ctx.closePath();
            ctx.fill();

            // Health bar above ship
            ctx.fillStyle = "rgba(0,0,0,0.5)"; ctx.fillRect(x - size, y - size - 8, size * 2, 3);
            ctx.fillStyle = "#ff0055"; ctx.fillRect(x - size, y - size - 8, (size * 2) * (hp / 100), 3);
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }
        loop();
    </script>
</body>
</html>
